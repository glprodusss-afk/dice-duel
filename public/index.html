<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Кости — Мультиплеер</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --tg-bg: var(--tg-theme-bg-color, #ffffff);
    --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f1f1f1);
    --tg-text: var(--tg-theme-text-color, #222222);
    --tg-hint: var(--tg-theme-hint-color, #999999);
    --tg-link: var(--tg-theme-link-color, #2481cc);
    --tg-button: var(--tg-theme-button-color, #2481cc);
    --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
    --tg-accent: var(--tg-theme-accent-text-color, #2481cc);
    --bubble-out: var(--tg-theme-button-color, #2481cc);
    --bubble-out-text: var(--tg-theme-button-text-color, #ffffff);
    --bubble-in: var(--tg-theme-secondary-bg-color, #f1f1f1);
    --bubble-in-text: var(--tg-theme-text-color, #222222);
    --radius: 18px;
    --radius-sm: 6px;
    --shadow: 0 2px 8px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--tg-bg);
    color: var(--tg-text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    background: var(--tg-bg);
    border-bottom: 1px solid rgba(128,128,128,0.15);
    padding: 12px 16px 10px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 10;
    flex-shrink: 0;
  }
  #header .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--tg-button);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  #header .info { flex: 1; }
  #header .title { font-weight: 600; font-size: 15px; }
  #header .subtitle { font-size: 12px; color: var(--tg-hint); margin-top: 1px; }

  /* ── Chat area ── */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scroll-behavior: smooth;
  }

  /* ── Message bubbles ── */
  .msg-wrap {
    display: flex;
    flex-direction: column;
    animation: msgIn 0.25s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(14px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .msg-wrap.out { align-items: flex-end; }
  .msg-wrap.in  { align-items: flex-start; }
  .msg-wrap.center { align-items: center; }

  .bubble {
    max-width: 78%;
    padding: 9px 13px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height: 1.45;
    position: relative;
    word-break: break-word;
  }
  .out .bubble {
    background: var(--bubble-out);
    color: var(--bubble-out-text);
    border-bottom-right-radius: var(--radius-sm);
  }
  .in .bubble {
    background: var(--bubble-in);
    color: var(--bubble-in-text);
    border-bottom-left-radius: var(--radius-sm);
  }
  .center .bubble {
    background: rgba(128,128,128,0.12);
    color: var(--tg-hint);
    font-size: 12.5px;
    padding: 5px 12px;
    border-radius: 20px;
    max-width: 90%;
    text-align: center;
  }
  .sender-name {
    font-size: 11.5px;
    font-weight: 600;
    color: var(--tg-accent);
    margin-bottom: 2px;
    padding-left: 2px;
  }
  .msg-time {
    font-size: 10.5px;
    opacity: 0.6;
    text-align: right;
    margin-top: 3px;
  }

  /* ── Dice in bubble ── */
  .dice-msg {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dice-3d-wrap {
    perspective: 120px;
    width: 48px; height: 48px;
  }
  .dice-3d {
    width: 48px; height: 48px;
    position: relative;
    transform-style: preserve-3d;
    border-radius: 10px;
  }
  .dice-3d.rolling {
    animation: diceRoll 0.7s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes diceRoll {
    0%   { transform: rotateX(0) rotateY(0) rotateZ(0); }
    20%  { transform: rotateX(180deg) rotateY(90deg) rotateZ(45deg); }
    40%  { transform: rotateX(360deg) rotateY(200deg) rotateZ(90deg); }
    60%  { transform: rotateX(450deg) rotateY(320deg) rotateZ(180deg); }
    80%  { transform: rotateX(540deg) rotateY(380deg) rotateZ(220deg); }
    100% { transform: rotateX(720deg) rotateY(450deg) rotateZ(270deg); }
  }
  .dice-face {
    position: absolute;
    width: 48px; height: 48px;
    background: #fff;
    border: 2px solid #ddd;
    border-radius: 9px;
    display: grid;
    padding: 6px;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.12);
  }
  .dice-face.front  { transform: translateZ(24px); }
  .dice-face.back   { transform: rotateY(180deg) translateZ(24px); }
  .dice-face.right  { transform: rotateY(90deg) translateZ(24px); }
  .dice-face.left   { transform: rotateY(-90deg) translateZ(24px); }
  .dice-face.top    { transform: rotateX(90deg) translateZ(24px); }
  .dice-face.bottom { transform: rotateX(-90deg) translateZ(24px); }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #222;
    align-self: center;
    justify-self: center;
  }
  .dice-result-text { font-size: 22px; font-weight: 700; }

  /* ── Screens ── */
  #screen-start, #screen-waiting, #screen-result {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px 20px;
    animation: screenFade 0.3s ease both;
  }
  @keyframes screenFade {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen-title {
    font-size: 22px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }
  .screen-sub {
    font-size: 14px;
    color: var(--tg-hint);
    text-align: center;
  }

  /* ── Buttons ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%;
    padding: 14px 20px;
    border: none;
    border-radius: 14px;
    font-size: 15.5px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s, opacity 0.12s, box-shadow 0.12s;
    outline: none;
    position: relative;
    overflow: hidden;
    -webkit-appearance: none;
  }
  .btn:active { transform: scale(0.97); opacity: 0.9; }
  .btn-primary {
    background: var(--tg-button);
    color: var(--tg-button-text);
    box-shadow: 0 4px 14px rgba(36,129,204,0.3);
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    width: 100%; height: 100%;
    top: 0; left: 0;
    background: rgba(255,255,255,0.08);
    animation: pulse 2.5s infinite;
    border-radius: inherit;
    pointer-events: none;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
  }
  .btn-secondary {
    background: var(--tg-secondary-bg);
    color: var(--tg-text);
  }
  .btn-ghost {
    background: transparent;
    color: var(--tg-accent);
    border: 1.5px solid var(--tg-accent);
  }
  .btn-sm {
    width: auto;
    padding: 8px 16px;
    font-size: 13.5px;
    border-radius: 10px;
  }

  /* ── Code display ── */
  .code-box {
    background: var(--tg-secondary-bg);
    border-radius: 16px;
    padding: 22px 28px;
    text-align: center;
    width: 100%;
  }
  .code-label { font-size: 12px; color: var(--tg-hint); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .code-value { font-size: 42px; font-weight: 800; letter-spacing: 10px; color: var(--tg-button); font-variant-numeric: tabular-nums; }

  /* ── Input ── */
  .tg-input {
    width: 100%;
    padding: 13px 16px;
    border-radius: 14px;
    border: 1.5px solid rgba(128,128,128,0.25);
    background: var(--tg-secondary-bg);
    color: var(--tg-text);
    font-size: 16px;
    outline: none;
    text-align: center;
    letter-spacing: 6px;
    font-weight: 700;
    transition: border-color 0.2s;
  }
  .tg-input:focus { border-color: var(--tg-button); }
  .tg-input::placeholder { letter-spacing: 1px; font-weight: 400; color: var(--tg-hint); }

  /* ── Bottom panel ── */
  #bottom-bar {
    background: var(--tg-bg);
    border-top: 1px solid rgba(128,128,128,0.15);
    padding: 10px 12px 14px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #roll-btn {
    flex: 1;
    margin: 0;
    padding: 13px;
  }
  .turn-indicator {
    font-size: 13px;
    color: var(--tg-hint);
    text-align: center;
    padding: 4px 0 8px;
    flex-shrink: 0;
    width: 100%;
  }

  /* ── Scores bar ── */
  #scores-bar {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: var(--tg-secondary-bg);
    border-bottom: 1px solid rgba(128,128,128,0.1);
    flex-shrink: 0;
  }
  .score-card {
    flex: 1;
    background: var(--tg-bg);
    border-radius: 12px;
    padding: 8px 10px;
    text-align: center;
  }
  .score-card.active {
    border: 2px solid var(--tg-button);
  }
  .score-name { font-size: 11px; color: var(--tg-hint); margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .score-val { font-size: 20px; font-weight: 800; }
  .score-throws { font-size: 10px; color: var(--tg-hint); margin-top: 1px; }

  /* ── Result screen ── */
  .result-anim { font-size: 80px; animation: resultPop 0.5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes resultPop {
    from { transform: scale(0) rotate(-15deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .result-title { font-size: 26px; font-weight: 800; }
  .result-scores {
    display: flex; gap: 16px; width: 100%;
  }
  .result-score-item {
    flex: 1;
    background: var(--tg-secondary-bg);
    border-radius: 14px;
    padding: 14px;
    text-align: center;
  }
  .result-score-item.winner { background: rgba(36,204,100,0.12); border: 1.5px solid rgba(36,204,100,0.3); }
  .result-score-item .rs-name { font-size: 12px; color: var(--tg-hint); }
  .result-score-item .rs-val { font-size: 28px; font-weight: 800; margin: 4px 0; }
  .result-score-item .rs-label { font-size: 11px; color: var(--tg-hint); }

  .gif-container {
    width: 100%;
    max-width: 300px;
    border-radius: 16px;
    overflow: hidden;
  }
  .gif-container img { width: 100%; height: 200px; object-fit: cover; display: block; }

  /* ── Confetti / Rain ── */
  #fx-layer {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 100;
  }
  .confetti-bit {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    top: -10px;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  .rain-drop {
    position: absolute;
    width: 2px; height: 18px;
    background: rgba(100,150,255,0.5);
    border-radius: 2px;
    animation: rainFall linear forwards;
    top: -20px;
  }
  @keyframes rainFall {
    to { transform: translateY(110vh); opacity: 0; }
  }

  /* ── Waiting screen ── */
  .waiting-spinner {
    width: 48px; height: 48px;
    border: 3px solid rgba(128,128,128,0.2);
    border-top-color: var(--tg-button);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Hidden ── */
  .hidden { display: none !important; }
  .flex-col { display: flex; flex-direction: column; }
  .w-full { width: 100%; }
</style>
</head>
<body>

<div id="fx-layer"></div>

<!-- ══════════════════════════════ START SCREEN ══════════════════════════════ -->
<div id="screen-start" class="flex-col">
  <div style="font-size:56px;margin-bottom:4px">🎲</div>
  <div class="screen-title">Кости — Дуэль</div>
  <div class="screen-sub">Брось кубик 3 раза.<br>Победит тот, у кого сумма больше!</div>

  <div style="width:100%;display:flex;flex-direction:column;gap:10px;margin-top:8px">
    <button class="btn btn-primary" onclick="createGame()">
      🎮 Создать игру
    </button>
    <button class="btn btn-secondary" onclick="showJoinPanel()">
      🔑 Войти по коду
    </button>
  </div>

  <div id="join-panel" class="hidden w-full flex-col" style="gap:10px;margin-top:4px">
    <input id="join-code" class="tg-input" type="text" inputmode="text"
           maxlength="6" placeholder="Введи код" style="letter-spacing:4px;text-transform:uppercase;">
    <button class="btn btn-primary" onclick="joinGame()">Подключиться →</button>
    <div class="screen-sub" id="join-error" style="color:#ff3b30;display:none;"></div>
  </div>

  <div id="created-panel" class="hidden w-full flex-col" style="gap:10px;margin-top:4px;align-items:center">
    <div class="code-box">
      <div class="code-label">Код игры</div>
      <div class="code-value" id="game-code-display">------</div>
    </div>
    <button class="btn btn-ghost btn-sm" id="copy-code-btn">📋 Скопировать код</button>
    <div class="screen-sub" style="margin-top:4px">Ожидаем второго игрока…</div>
    <div class="waiting-spinner" style="margin-top:8px"></div>
  </div>
</div>

<!-- ══════════════════════════════ GAME SCREEN ══════════════════════════════ -->
<div id="screen-game" class="hidden flex-col" style="flex:1;overflow:hidden;height:100vh">
  <!-- Header -->
  <div id="header">
    <div class="avatar">🎲</div>
    <div class="info">
      <div class="title">Кости — Дуэль</div>
      <div class="subtitle" id="game-status-text">Идёт игра…</div>
    </div>
  </div>

  <!-- Scores -->
  <div id="scores-bar">
    <div class="score-card" id="score-card-me">
      <div class="score-name" id="score-name-me">Вы</div>
      <div class="score-val" id="score-val-me">0</div>
      <div class="score-throws" id="score-throws-me">0/3 бросков</div>
    </div>
    <div class="score-card" id="score-card-opp">
      <div class="score-name" id="score-name-opp">Соперник</div>
      <div class="score-val" id="score-val-opp">0</div>
      <div class="score-throws" id="score-throws-opp">0/3 бросков</div>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat"></div>

  <!-- Bottom bar -->
  <div id="bottom-bar" style="flex-direction:column;padding-top:6px">
    <div class="turn-indicator" id="turn-indicator">Ожидание…</div>
    <button class="btn btn-primary" id="roll-btn" onclick="rollDice()" disabled>
      🎲 Бросить кубик
    </button>
  </div>
</div>

<!-- ══════════════════════════════ RESULT SCREEN ══════════════════════════════ -->
<div id="screen-result" class="hidden flex-col">
  <div class="result-anim" id="result-emoji">🏆</div>
  <div class="result-title" id="result-title">Победа!</div>
  <div class="screen-sub" id="result-sub">Вы набрали больше очков</div>

  <div class="result-scores" id="result-scores"></div>

  <div class="gif-container hidden" id="gif-container">
    <img id="gif-img" src="" alt="">
  </div>

  <div style="width:100%;display:flex;flex-direction:column;gap:10px;margin-top:8px">
    <button class="btn btn-primary" id="play-again-btn">🎮 Играть ещё</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════
//  Telegram Web App init
// ══════════════════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const myName = tg?.initDataUnsafe?.user?.first_name || 'Вы';
const oppDefaultName = 'Соперник';

// ══════════════════════════════════════════════════════════
//  Game state
// ══════════════════════════════════════════════════════════
const socket = io({ transports: ['websocket', 'polling'] });
let roomId = null;
let myId = null;
let myTurn = false;
let myScore = 0, oppScore = 0;
let myThrows = 0, oppThrows = 0;
let oppName = oppDefaultName;
const MAX_THROWS = 3;
const GIPHY_KEY = 'p6l8yF0x9aPR5bLxH5z3v6q2wR1t4y7j';
let gameOver = false;

// ══════════════════════════════════════════════════════════
//  Socket events (matching server.js exactly)
// ══════════════════════════════════════════════════════════
socket.on('connect', () => {
  myId = socket.id;
  console.log('Connected:', myId);
});

socket.on('player_joined', () => {
  document.getElementById('game-status-text').textContent = 'Игрок найден!';
  addMessage('center', '🎮 Игрок 2 присоединился!');
});

socket.on('game_started', (data) => {
  document.getElementById('created-panel').classList.add('hidden');
  document.getElementById('screen-start').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  addMessage('center', '🎲 Игра началась! Бросайте кубики по очереди.');
});

socket.on('your_turn', () => {
  myTurn = true;
  updateTurnUI();
});

socket.on('opponent_turn', () => {
  myTurn = false;
  updateTurnUI();
});

socket.on('dice_rolled', (data) => {
  const isMine = data.player === myId;
  if (isMine) {
    myScore += data.roll;
    myThrows = data.dice.length;
  } else {
    oppScore += data.roll;
    oppThrows = data.dice.length;
  }
  updateScores();
  addDiceMessage(isMine ? 'out' : 'in', data.roll, isMine ? myThrows : oppThrows);
});

socket.on('game_over', (data) => {
  gameOver = true;
  const iAmP1 = data.p1.id === myId;
  const myData = iAmP1 ? data.p1 : data.p2;
  const oppData = iAmP1 ? data.p2 : data.p1;
  myScore = myData.sum;
  oppScore = oppData.sum;
  myThrows = MAX_THROWS;
  oppThrows = MAX_THROWS;
  updateScores();

  const winnerId = data.winner;
  const gifUrl = data.gifs[myId];
  setTimeout(() => showResult(winnerId, gifUrl, iAmP1 ? data.p1 : data.p2, iAmP1 ? data.p2 : data.p1), 500);
});

socket.on('player_left', () => {
  if (!gameOver) {
    addMessage('center', '😢 Соперник покинул игру');
    document.getElementById('game-status-text').textContent = 'Игрок вышел';
    document.getElementById('roll-btn').disabled = true;
  }
});

socket.on('game_reset', () => {
  resetGameState();
  document.getElementById('screen-result').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  document.getElementById('chat').innerHTML = '';
  document.getElementById('fx-layer').innerHTML = '';
  addMessage('center', '🔄 Новая игра!');
});

socket.on('error_message', (msg) => {
  document.getElementById('join-error').textContent = '⚠️ ' + msg;
  document.getElementById('join-error').style.display = 'block';
});

// ══════════════════════════════════════════════════════════
//  UI functions
// ══════════════════════════════════════════════════════════
function createGame() {
  socket.emit('create_room', (res) => {
    roomId = res.roomId;
    document.getElementById('game-code-display').textContent = roomId;
    document.getElementById('join-panel').classList.add('hidden');
    document.getElementById('created-panel').classList.remove('hidden');
  });
}

function showJoinPanel() {
  document.getElementById('join-panel').classList.remove('hidden');
  document.getElementById('created-panel').classList.add('hidden');
  document.getElementById('join-error').style.display = 'none';
}

function joinGame() {
  const code = document.getElementById('join-code').value.trim().toLowerCase();
  if (code.length !== 6) {
    document.getElementById('join-error').textContent = 'Введи 6-значный код';
    document.getElementById('join-error').style.display = 'block';
    return;
  }
  roomId = code;
  socket.emit('join_room', roomId, (res) => {
    if (res.error) {
      document.getElementById('join-error').textContent = 'Ошибка: ' + res.error;
      document.getElementById('join-error').style.display = 'block';
    } else {
      document.getElementById('join-error').style.display = 'none';
      document.getElementById('join-panel').classList.add('hidden');
    }
  });
}

// Copy code button
document.getElementById('copy-code-btn').addEventListener('click', function() {
  const code = document.getElementById('game-code-display').textContent;
  navigator.clipboard?.writeText(code).then(() => {
    this.textContent = '✅ Скопировано!';
    setTimeout(() => { this.textContent = '📋 Скопировать код'; }, 1500);
  });
});

function rollDice() {
  if (!myTurn || gameOver) return;
  socket.emit('roll_dice', roomId);
  myTurn = false;
  updateTurnUI();
  playDiceSound();
}

function updateScores() {
  document.getElementById('score-val-me').textContent = myScore;
  document.getElementById('score-val-opp').textContent = oppScore;
  document.getElementById('score-throws-me').textContent = myThrows + '/3 бросков';
  document.getElementById('score-throws-opp').textContent = oppThrows + '/3 бросков';
  document.getElementById('score-card-me').classList.toggle('active', myTurn);
  document.getElementById('score-card-opp').classList.toggle('active', !myTurn && !gameOver);
}

function updateTurnUI() {
  const indicator = document.getElementById('turn-indicator');
  const btn = document.getElementById('roll-btn');
  if (gameOver) {
    indicator.textContent = 'Игра завершена';
    btn.disabled = true;
    btn.style.opacity = '0.5';
    document.getElementById('game-status-text').textContent = 'Конец игры';
  } else if (myTurn) {
    indicator.textContent = '⬆️ Ваш ход — бросьте кубик!';
    btn.disabled = false;
    btn.style.opacity = '1';
    document.getElementById('game-status-text').textContent = 'Ваш ход';
  } else {
    indicator.textContent = '⏳ Ход соперника…';
    btn.disabled = true;
    btn.style.opacity = '0.5';
    document.getElementById('game-status-text').textContent = 'Ход соперника';
  }
}

// ══════════════════════════════════════════════════════════
//  Chat messages
// ══════════════════════════════════════════════════════════
function addMessage(type, text) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + type;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  wrap.innerHTML = `<div class="bubble">${text}<div class="msg-time">${time}</div></div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function addDiceMessage(type, value, throwNum) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap ' + type;
  const now = new Date();
  const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  const whoLabel = type === 'out' ? 'Вы бросили' : oppName + ' бросил';
  const senderName = type === 'in' ? oppName : '';

  let inner = '';
  if (senderName) inner += `<div class="sender-name">${senderName}</div>`;
  inner += `
    <div class="bubble">
      <div class="dice-msg">
        <div class="dice-3d-wrap">
          <div class="dice-3d rolling">
            ${buildAllFaces(value)}
          </div>
        </div>
        <div>
          <div style="font-size:12px;opacity:0.7;margin-bottom:2px">${whoLabel}</div>
          <div class="dice-result-text">+${value}</div>
          <div style="font-size:11px;opacity:0.65;margin-top:2px">Бросок ${throwNum}/${MAX_THROWS}</div>
        </div>
      </div>
      <div class="msg-time">${time}</div>
    </div>`;
  wrap.innerHTML = inner;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function buildAllFaces(frontVal) {
  const sides = ['front','back','right','left','top','bottom'];
  return sides.map(s => `<div class="dice-face ${s}">${buildDotGrid(frontVal)}</div>`).join('');
}

function buildDotGrid(n) {
  const grids = {
    1: '<div style="display:grid;grid-template:1fr/1fr;width:100%;height:100%"><div class="dot" style="justify-self:center;align-self:center"></div></div>',
    2: '<div style="display:grid;grid-template:1fr 1fr/1fr;width:100%;height:100%;gap:3px"><div class="dot" style="justify-self:end;align-self:start"></div><div class="dot" style="justify-self:start;align-self:end"></div></div>',
    3: '<div style="display:grid;grid-template:1fr 1fr 1fr/1fr;width:100%;height:100%;gap:2px"><div class="dot" style="justify-self:end;align-self:start"></div><div class="dot" style="justify-self:center;align-self:center"></div><div class="dot" style="justify-self:start;align-self:end"></div></div>',
    4: '<div style="display:grid;grid-template:1fr 1fr/1fr 1fr;width:100%;height:100%;gap:3px"><div class="dot" style="align-self:start;justify-self:start"></div><div class="dot" style="align-self:start;justify-self:end"></div><div class="dot" style="align-self:end;justify-self:start"></div><div class="dot" style="align-self:end;justify-self:end"></div></div>',
    5: '<div style="display:grid;grid-template:1fr 1fr 1fr/1fr 1fr;width:100%;height:100%;gap:2px"><div class="dot" style="align-self:start;justify-self:start"></div><div class="dot" style="align-self:start;justify-self:end"></div><div class="dot" style="align-self:center;justify-self:center;grid-column:1/3"></div><div class="dot" style="align-self:end;justify-self:start"></div><div class="dot" style="align-self:end;justify-self:end"></div></div>',
    6: '<div style="display:grid;grid-template:1fr 1fr 1fr/1fr 1fr;width:100%;height:100%;gap:2px"><div class="dot" style="align-self:start;justify-self:start"></div><div class="dot" style="align-self:start;justify-self:end"></div><div class="dot" style="align-self:center;justify-self:start"></div><div class="dot" style="align-self:center;justify-self:end"></div><div class="dot" style="align-self:end;justify-self:start"></div><div class="dot" style="align-self:end;justify-self:end"></div></div>',
  };
  return grids[n] || grids[1];
}

// ══════════════════════════════════════════════════════════
//  Result screen
// ══════════════════════════════════════════════════════════
async function showResult(winnerId, gifUrl, p1Data, p2Data) {
  const iAmP1 = p1Data.id === myId;
  const myData = iAmP1 ? p1Data : p2Data;
  const oppData = iAmP1 ? p2Data : p1Data;

  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-result').classList.remove('hidden');

  const isDraw = winnerId === null;
  const iWon = winnerId === myId;

  let emoji, title, sub;
  if (isDraw) {
    emoji = '🤝'; title = 'Ничья!'; sub = 'Вы набрали одинаково очков';
  } else if (iWon) {
    emoji = '🏆'; title = 'Победа!'; sub = 'Вы набрали больше очков';
    playWinSound();
  } else {
    emoji = '😿'; title = 'Поражение'; sub = 'В следующий раз повезёт!';
    playLoseSound();
  }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-sub').textContent = sub;

  const scoresDiv = document.getElementById('result-scores');
  scoresDiv.innerHTML = `
    <div class="result-score-item ${iWon ? 'winner' : ''}">
      <div class="rs-name">${myName} (Вы)</div>
      <div class="rs-val">${myData.sum}</div>
      <div class="rs-label">очков</div>
    </div>
    <div class="result-score-item ${!iWon && !isDraw ? 'winner' : ''}">
      <div class="rs-name">${oppName}</div>
      <div class="rs-val">${oppData.sum}</div>
      <div class="rs-label">очков</div>
    </div>
  `;

  // GIF
  if (gifUrl) {
    document.getElementById('gif-img').src = gifUrl;
    document.getElementById('gif-container').classList.remove('hidden');
  } else {
    document.getElementById('gif-container').classList.add('hidden');
  }

  if (!isDraw) showFallbackFX(iWon);

  document.getElementById('play-again-btn').onclick = () => {
    socket.emit('play_again', roomId);
    resetGameState();
  };
}

function showFallbackFX(win) {
  const layer = document.getElementById('fx-layer');
  layer.innerHTML = '';
  const count = win ? 60 : 40;
  const colors = win
    ? ['#FFD700','#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#FFEAA7']
    : ['#6C8EBF','#7EA7D4','#9EC5E8','#5577AA','#8BA5C9'];

  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = win ? 'confetti-bit' : 'rain-drop';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    el.style.animationDelay = (Math.random() * 2) + 's';
    if (win) {
      el.style.width = el.style.height = (Math.random() * 8 + 5) + 'px';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    }
    layer.appendChild(el);
  }
  setTimeout(() => layer.innerHTML = '', 5000);
}

function resetGameState() {
  myScore = 0; oppScore = 0;
  myThrows = 0; oppThrows = 0;
  myTurn = false;
  gameOver = false;
  updateScores();
  updateTurnUI();
}

// ══════════════════════════════════════════════════════════
//  Audio
// ══════════════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playDiceSound() {
  try {
    const ctx = getAudioCtx();
    for (let i = 0; i < 3; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.12;
      osc.type = 'square';
      osc.frequency.setValueAtTime(280 + Math.random()*80, t);
      osc.frequency.exponentialRampToValueAtTime(60, t + 0.08);
      gain.gain.setValueAtTime(0.18, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.1);
    }
  } catch(e) {}
}
function playWinSound() {
  try {
    const ctx = getAudioCtx();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.18;
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.22, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e) {}
}
function playLoseSound() {
  try {
    const ctx = getAudioCtx();
    [392, 349, 330, 294].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      const t = ctx.currentTime + i * 0.22;
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(freq, t);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.6);
    });
  } catch(e) {}
}
</script>
